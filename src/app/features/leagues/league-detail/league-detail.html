@if (loading()) {
  <p>Loading league...</p>
} @else if (!league()) {
  <p>League not found.</p>
} @else {
  <h1>{{ league()?.name }}</h1>

  <p>Invite Code: {{ league()?.inviteCode }}</p>
  <p>Max Teams: {{ league()?.maxTeams }}</p>
  <p>Format: {{ league()?.matchupFormat }}</p>

  <h2>Scoring Rules</h2>
  <pre>{{ league()?.scoringRules | json }}</pre>
}
